name: Asset Normalizer

on:
  push:
    paths:
      - 'raw/**'
      - 'tools/**'
      - '.github/workflows/**'

jobs:
  normalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Run normalizer
        run: python tools/normalize_assets.py

      - name: Detect changes
        id: detect
        run: |
          if [ -n "$(git status --porcelain production)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated assets
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add production
          git commit -m "Normalize assets"

      - name: Push changes
        if: steps.detect.outputs.changed == 'true'
        run: git push

      - name: Trigger World Library Sync
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run sync-world-library.yml --ref main --repo ${{ github.repository }}
